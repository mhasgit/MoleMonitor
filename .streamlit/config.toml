# Toolbar hidden via config (stable across Streamlit versions).
# Override with toolbarMode = "viewer" or "auto" if you need the toolbar for debugging.
[client]
toolbarMode = "minimal"

# Use app accent (teal) for primary buttons so login/auth match the app.
[theme]
primaryColor = "#0D9488"
backgroundColor = "#0F1419"
secondaryBackgroundColor = "#1A2234"
textColor = "#F1F5F9"
font = "sans serif"
